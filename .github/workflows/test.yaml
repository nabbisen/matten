name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt / clippy / test (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Core dependency boundary (RFC-022)
        run: bash scripts/check-core-dependency-boundary.sh
      - name: Clippy (workspace, all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Clippy core (no-default-features)
        run: cargo clippy -p matten --all-targets --no-default-features -- -D warnings
      - name: Clippy core (dynamic only)
        run: cargo clippy -p matten --all-targets --no-default-features --features dynamic -- -D warnings
      - name: Test (workspace)
        run: cargo test --workspace --all-targets
      - name: Doctests (workspace)
        run: cargo test --workspace --doc
      - name: Check examples compile (workspace)
        run: cargo check --workspace --examples --all-features

  core-features:
    name: core feature profiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p matten --no-default-features
      - run: cargo test -p matten --no-default-features --features serde
      - run: cargo test -p matten --no-default-features --features json
      - run: cargo test -p matten --no-default-features --features csv
      - run: cargo test -p matten --no-default-features --features dynamic
      - run: cargo test -p matten --no-default-features --features dynamic,json
      - run: cargo test -p matten --no-default-features --features dynamic,csv
      - run: cargo test -p matten --no-default-features --features dynamic,json,csv
      - run: cargo test -p matten --all-features

  bridge:
    name: matten-ndarray
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p matten-ndarray
      - run: cargo test -p matten-ndarray --features dynamic
      - run: cargo test -p matten-ndarray --doc

  mlprep:
    name: matten-mlprep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p matten-mlprep
      - run: cargo test -p matten-mlprep --features dynamic
      - run: cargo test -p matten-mlprep --doc

  data:
    name: matten-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check -p matten-data
      - run: cargo clippy -p matten-data --all-targets -- -D warnings
      - run: cargo test -p matten-data --doc

  msrv:
    name: MSRV 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85.0
      - run: cargo build --workspace
      - run: cargo test --workspace --all-features --quiet

  smoke:
    name: example smoke runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # core matten
      - run: cargo run -p matten --example 00_quickstart
      - run: cargo run -p matten --example 06_broadcasting
      - run: cargo run -p matten --example 08_slicing_builder
      - run: cargo run -p matten --example 12_boundary_error_handling
      - run: cargo run -p matten --example 25_normalize_vector
      - run: cargo run -p matten --example 26_cosine_similarity
      - run: cargo run -p matten --example 30_magic_square_checker
      - run: cargo run -p matten --example 31_fibonacci_matrix_power
      - run: cargo run -p matten --example 32_graph_path_counting
      - run: cargo run -p matten --example 33_markov_chain_weather
      - run: cargo run -p matten --example 34_tiny_pagerank
      - run: cargo run -p matten --example 35_linear_regression_gradient_descent
      - run: cargo run -p matten --example 36_heat_equation_1d
      - run: cargo run -p matten --example dynamic_00_quickstart --features dynamic,json,csv
      - run: cargo run -p matten --example dynamic_05_dirty_csv_cleanup --features dynamic,json,csv
      - run: cargo run -p matten --example standardize_columns
      - run: cargo run -p matten --example gram_matrix
      - run: cargo run -p matten --example 13_resource_limits
      - run: cargo run -p matten --example 27_axis_reductions
      - run: cargo run -p matten --example 28_column_statistics
      - run: cargo run -p matten --example dynamic_06_numeric_policy --features dynamic
      - run: cargo run -p matten --example dynamic_07_on_ramp_summary --features dynamic
      # matten-ndarray
      - run: cargo run -p matten-ndarray --example to_arrayd
      - run: cargo run -p matten-ndarray --example from_arrayd
      # matten-mlprep
      - run: cargo run -p matten-mlprep --example mlprep_standardize_columns
      - run: cargo run -p matten-mlprep --example mlprep_minmax_scale
      - run: cargo run -p matten-mlprep --example mlprep_add_bias_column
      - run: cargo run -p matten-mlprep --example mlprep_train_test_split
      # matten-data
      - run: cargo run -p matten-data --example csv_to_tensor
