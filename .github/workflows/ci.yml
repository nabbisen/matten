name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test (default profile)
        run: cargo test --all-targets
      - name: Doctests
        run: cargo test --doc
      - name: Check examples compile
        run: cargo check --examples
      - name: Test examples
        run: cargo test --examples

  features:
    name: feature profiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Lean core
        run: cargo test --no-default-features
      - name: serde isolated
        run: cargo test --no-default-features --features serde
      - name: json isolated
        run: cargo test --no-default-features --features json
      - name: csv isolated
        run: cargo test --no-default-features --features csv
      - name: dynamic isolated
        run: cargo test --no-default-features --features dynamic
      - name: dynamic+json+csv
        run: cargo test --no-default-features --features dynamic,json,csv
      - name: All features
        run: cargo test --all-features

  msrv:
    name: MSRV 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - run: cargo build
      - run: cargo test

  smoke:
    name: example smoke runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo run --example 00_quickstart
      - run: cargo run --example 06_broadcasting
      - run: cargo run --example 08_slicing_builder
      - run: cargo run --example 12_boundary_error_handling
      - run: cargo run --example 25_normalize_vector
      - run: cargo run --example 26_cosine_similarity
      - run: cargo run --example dynamic_00_quickstart --features dynamic,json,csv
      - run: cargo run --example dynamic_05_dirty_csv_cleanup --features dynamic,json,csv
      - run: cargo run --example standardize_columns
      - run: cargo run --example gram_matrix
